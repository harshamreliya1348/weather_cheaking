<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Cheaking</title>
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="main">
          <div class="search">
              <div class="input">
                <input type="text" name="search" id="city" placeholder="Enter City Name">
              </div>
              <button class="icon">
                <i class="fa-solid fa-magnifying-glass"></i>
              </button>
          </div>
          <div class="img">
            <img src="normal_weather.png" id ="main_img">
          </div>
          <h1 id="temp">21°C</h1>
          <h2 id="city_name">Bhavnagar</h2>
        <div class="footer">
          <div class="humilidity">
            <img src="wave.png" id="bottom">
            <div class="para">
              <h2 id="humi">64%</h2>
              <p>Humidity</p>
            </div>
          </div>
            <div class="wind">
              <img src="wind.png" id="bottom">
              <div class="para">
                <h2 id="wind">64%</h2>
                <p>Wind speed</p>
              </div>
          </div>
        </div>
    </div>
    <script src="java.js"></script>
</body>
</html>
